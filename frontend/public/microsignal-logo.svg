<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Signal pulse icon -->
  <g transform="translate(10, 12)">
    <!-- Outer ring -->
    <circle cx="38" cy="38" r="36" stroke="url(#signalGrad)" stroke-width="2.5" fill="none" opacity="0.25"/>
    <!-- Middle ring -->
    <circle cx="38" cy="38" r="26" stroke="url(#signalGrad)" stroke-width="2" fill="none" opacity="0.45"/>
    <!-- Inner ring -->
    <circle cx="38" cy="38" r="16" stroke="url(#signalGrad)" stroke-width="1.8" fill="none" opacity="0.7"/>
    <!-- Signal line (EKG / pulse style) -->
    <polyline
      points="2,38 14,38 20,38 26,18 32,58 38,28 44,48 50,38 56,38 74,38"
      stroke="url(#signalGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- "Macro" text -->
  <text x="98" y="62" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="300" fill="#e2e8f0" letter-spacing="-0.5">
    Macro
  </text>

  <!-- "Signal" text -->
  <text x="210" y="62" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#signalGrad)" letter-spacing="-0.5">
    Signal
  </text>
</svg>
